services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ufw-gui-backend
    network_mode: host
    privileged: true
    environment:
      - TZ=Europe/Kyiv
    volumes:
      - ./backend:/app
      - /etc/ufw:/etc/ufw
      - /var/run/fail2ban/fail2ban.sock:/var/run/fail2ban/fail2ban.sock
      - /var/log:/var/log:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ufw-gui-frontend
    network_mode: host
    environment:
      - TZ=Europe/Kyiv
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
    restart: always

  nginx:
    image: nginx:alpine
    container_name: ufw-gui-nginx
    network_mode: host
    environment:
      - TZ=Europe/Kyiv
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - backend
      - frontend
    restart: always